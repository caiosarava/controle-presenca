<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerar Ícones PWA</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 1rem;
      background: #f8fafc;
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 {
      color: #1e293b;
      margin-bottom: 1rem;
    }
    p {
      color: #64748b;
      margin-bottom: 1.5rem;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover {
      background: #1d4ed8;
    }
    .icons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 1rem;
      margin-top: 2rem;
    }
    .icon-item {
      text-align: center;
      padding: 1rem;
      background: #f8fafc;
      border-radius: 8px;
    }
    .icon-item img {
      width: 64px;
      height: 64px;
      margin-bottom: 0.5rem;
    }
    .icon-item span {
      display: block;
      font-size: 0.75rem;
      color: #64748b;
    }
    .success {
      background: #16a34a;
      color: white;
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1rem;
      display: none;
    }
    .success.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gerador de Ícones PWA</h1>
    <p>Clique no botão abaixo para baixar os ícones nos tamanhos 192x192 e 512x512.</p>
    
    <button onclick="generateIcons()">Gerar e Baixar Ícones</button>
    
    <div class="success" id="success">
      Ícones gerados com sucesso! Verifique sua pasta de downloads.
    </div>
    
    <div class="icons-grid">
      <div class="icon-item">
        <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0OCIgZmlsbD0iIzI1NjNlYiIvPjxwYXRoIGQ9Ik01MCAyMiBDMzUgMjIgMjUgMzMgMjUgNDcgQzI1IDY1IDUwIDgyIDUwIDgyIEM1MCA4MiA3NSA2NSA3NSA0NyBDNzUgMzMgNjUgMjIgNTAgMjIgWiIgZmlsbD0id2hpdGUiIG9wYWNpdHk9IjAuOSIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iNDciIHI9IjEyIiBmaWxsPSIjMjU2M2ViIi8+PHBhdGggZD0iTTQ1IDQ3IEw0OCA1MSBMNTUgNDMiIHN0cm9rZT0id2hpdGUiIHN0cm9rZS13aWR0aD0iMyIgZmlsbD0ibm9uZSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIi8+PC9zdmc+" alt="Preview">
        <span>Preview</span>
      </div>
    </div>
  </div>

  <script>
    async function generateIcons() {
      const sizes = [192, 512];
      const svgContent = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
          <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
            </linearGradient>
          </defs>
          <circle cx="50" cy="50" r="48" fill="url(#gradient)"/>
          <path d="M50 22 C35 22 25 33 25 47 C25 65 50 82 50 82 C50 82 75 65 75 47 C75 33 65 22 50 22 Z" fill="white" opacity="0.9"/>
          <circle cx="50" cy="47" r="12" fill="#2563eb"/>
          <path d="M45 47 L48 51 L55 43" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      `;

      for (const size of sizes) {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        
        const img = new Image();
        img.src = 'data:image/svg+xml;base64,' + btoa(svgContent);
        
        await new Promise((resolve) => {
          img.onload = () => {
            ctx.drawImage(img, 0, 0, size, size);
            
            canvas.toBlob((blob) => {
              const link = document.createElement('a');
              link.download = \`icon-\${size}.png\`;
              link.href = URL.createObjectURL(blob);
              link.click();
              URL.revokeObjectURL(link.href);
              resolve();
            }, 'image/png');
          };
        });
      }
      
      document.getElementById('success').classList.add('show');
    }
  </script>
</body>
</html>
