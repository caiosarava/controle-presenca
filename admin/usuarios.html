    <div class="modal-overlay" id="modalUsuario">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modalTitle">Novo Usuário</h3>
          <button class="modal-close" id="modalClose">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="24" height="24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <form id="formUsuario">
          <div class="modal-body">
            <input type="hidden" id="usuarioId">
            
            <div class="form-group">
              <label for="nome" class="label">Nome Completo</label>
              <input type="text" id="nome" class="input" required placeholder="Ex: João Silva">
            </div>

            <div class="form-group">
              <label for="email" class="label">E-mail</label>
              <input type="email" id="email" class="input" required placeholder="exemplo@email.com">
            </div>

            <div class="form-group" id="senhaGrupo">
              <label for="senha" class="label">Senha</label>
              <input type="password" id="senha" class="input" placeholder="Mínimo 6 caracteres">
            </div>

            <div class="form-group">
              <label for="role" class="label">Perfil</label>
              <select id="role" class="input">
                <option value="normal">Usuário Normal</option>
                <option value="admin">Administrador</option>
              </select>
            </div>

            <div class="form-group">
              <label for="locaisAutorizados" class="label">Locais onde pode bater o ponto</label>
              <select id="locaisAutorizados" class="input" multiple style="min-height: 120px;">
              </select>
              <p class="text-sm text-secondary mt-2">Dica: clique segurando o dedo ou a tecla Ctrl para escolher mais de um.</p>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline" id="modalCancelar">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import { getLocalStorageUser, signOut } from '../js/auth.js';
    import { buscarLocais } from '../js/admin.js';
    import { supabase } from '../js/supabase.js';

    const currentUser = getLocalStorageUser();
    
    if (!currentUser || currentUser.profile?.role !== 'admin') {
      window.location.href = '/index.html';
    }

    const btnNovoUsuario = document.getElementById('btnNovoUsuario');
    const modalUsuario = document.getElementById('modalUsuario');
    const modalClose = document.getElementById('modalClose');
    const modalCancelar = document.getElementById('modalCancelar');
    const formUsuario = document.getElementById('formUsuario');
    const tabelaUsuarios = document.getElementById('tabelaUsuarios');
    const emptyState = document.getElementById('emptyState');
    const logoutBtn = document.getElementById('logoutBtn');
    const senhaGrupo = document.getElementById('senhaGrupo');

    let todosLocais = [];

    btnNovoUsuario?.addEventListener('click', () => {
      limparFormulario();
      document.getElementById('modalTitle').textContent = 'Novo Usuário';
      senhaGrupo.classList.remove('hidden');
      modalUsuario.classList.add('show');
    });

    modalClose?.addEventListener('click', () => {
      modalUsuario.classList.remove('show');
    });

    modalCancelar?.addEventListener('click', () => {
      modalUsuario.classList.remove('show');
    });

    modalUsuario?.addEventListener('click', (e) => {
      if (e.target === modalUsuario) {
        modalUsuario.classList.remove('show');
      }
    });

    const handleLogout = async (e) => {
      e.preventDefault();
      await signOut();
      localStorage.removeItem('user');
      window.location.href = '/index.html';
    };

    logoutBtn?.addEventListener('click', handleLogout);
    document.getElementById('logoutBtnBottom')?.addEventListener('click', handleLogout);

    formUsuario?.addEventListener('submit', async (e) => {
      e.preventDefault();

      const usuarioId = document.getElementById('usuarioId').value;
      const nome = document.getElementById('nome').value;
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const role = document.getElementById('role').value;
      const locaisSelecionados = Array.from(document.getElementById('locaisAutorizados').selectedOptions, option => option.value);

      if (!usuarioId && !senha) {
        alert('Senha é obrigatória para novos usuários');
        return;
      }

      const userData = {
        nome,
        email,
        role,
        locais_autorizados: locaisSelecionados,
      };

      let resultado;
      if (usuarioId) {
        resultado = await supabase
          .from('users')
          .update({ nome, role, locais_autorizados: locaisSelecionados })
          .eq('id', usuarioId);
      } else {
        const { data: authData, error: authError } = await supabase.auth.admin.createUser({
          email,
          password: senha,
          email_confirm: true,
        });

        if (authError) {
          alert('Erro: ' + authError.message);
          return;
        }

        userData.id = authData.user.id;
        const { error } = await supabase.from('users').insert([userData]);
        
        if (error) {
          alert('Erro: ' + error.message);
          return;
        }
        
        resultado = { data: userData, error: null };
      }

      if (resultado.error) {
        alert('Erro: ' + (resultado.error.message || 'Erro ao salvar usuário'));
      } else {
        modalUsuario.classList.remove('show');
        carregarUsuarios();
      }
    });

    function limparFormulario() {
      document.getElementById('usuarioId').value = '';
      document.getElementById('nome').value = '';
      document.getElementById('email').value = '';
      document.getElementById('senha').value = '';
      document.getElementById('role').value = 'normal';
      document.getElementById('locaisAutorizados').value = [];
    }

function getRoleBadge(role) {
  const badgeClass = role === 'admin' ? 'badge-primary' : 'badge-secondary';
  const badgeText = role === 'admin' ? 'Admin' : 'Usuário';
  return `<span class="badge ${badgeClass}">${badgeText}</span>`;
}

async function carregarUsuarios() {
  const { data: locais } = await buscarLocais();
  todosLocais = locais || [];

  const selectLocais = document.getElementById('locaisAutorizados');
  selectLocais.innerHTML = locais.map(local => `<option value="${local.id}">${local.nome}</option>`).join('');

  // Buscar todos os usuários da tabela users
  const { data: todosUsuarios, error } = await supabase
    .from('users')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.error('Erro ao buscar usuários:', error);
  }

  if (!todosUsuarios || todosUsuarios.length === 0) {
    tabelaUsuarios.parentElement.classList.add('hidden');
    emptyState.classList.remove('hidden');
    return;
  }

  emptyState.classList.add('hidden');
  tabelaUsuarios.parentElement.classList.remove('hidden');

  tabelaUsuarios.innerHTML = todosUsuarios.map(usuario => {
    const locaisUsuario = locais.filter(l => usuario.locais_autorizados?.includes(l.id));
    const locaisNomes = locaisUsuario.map(l => l.nome).join(', ') || 'Nenhum';

    return `
    <tr>
      <td>${usuario.nome || '-'}</td>
      <td>${usuario.email || '-'}</td>
      <td>${getRoleBadge(usuario.role)}</td>
      <td>${locaisNomes}</td>
      <td>
        <button class="btn-icon primary" onclick="editarUsuario('${usuario.id}')">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
          </svg>
        </button>
      </td>
    </tr>
    `}).join('');
}

    window.editarUsuario = async (usuarioId) => {
      const { data: usuario } = await supabase
        .from('users')
        .select('*')
        .eq('id', usuarioId)
        .single();

      if (usuario) {
        document.getElementById('modalTitle').textContent = 'Editar Usuário';
        document.getElementById('usuarioId').value = usuario.id;
        document.getElementById('nome').value = usuario.nome;
        document.getElementById('email').value = usuario.email;
        document.getElementById('role').value = usuario.role;
        document.getElementById('locaisAutorizados').value = usuario.locais_autorizados || [];
        senhaGrupo.classList.add('hidden');
        modalUsuario.classList.add('show');
      }
    };

    carregarUsuarios();
  </script>
