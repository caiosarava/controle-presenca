<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cadastro - Controle de Presença">
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232563eb'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15l-5-5 1.41-1.41L11 14.17l7.59-7.59L20 8l-9 9z'/></svg>">
  <title>Cadastro - Controle de Presença</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <h1>Criar Conta</h1>
          <p>Preencha os dados para se cadastrar</p>
        </div>

        <form id="cadastroForm" class="login-form">
          <div class="form-group">
            <label for="nome" class="label">Nome Completo</label>
            <input
              type="text"
              id="nome"
              name="nome"
              class="input"
              placeholder="Seu nome completo"
              required
              autocomplete="name"
            />
          </div>

          <div class="form-group">
            <label for="email" class="label">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              class="input"
              placeholder="seu@email.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="password" class="label">Senha</label>
            <input
              type="password"
              id="password"
              name="password"
              class="input"
              placeholder="Mínimo 6 caracteres"
              required
              minlength="6"
              autocomplete="new-password"
            />
          </div>

          <div class="form-group">
            <label for="confirmPassword" class="label">Confirmar Senha</label>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              class="input"
              placeholder="Confirme sua senha"
              required
              autocomplete="new-password"
            />
          </div>

          <div id="cadastroError" class="login-error"></div>

          <button type="submit" class="btn btn-primary btn-lg btn-block" id="cadastroBtn">
            <span id="cadastroBtnText">Cadastrar</span>
            <span id="cadastroBtnLoading" class="login-loading hidden">
              <span class="spinner"></span>
              Cadastrando...
            </span>
          </button>
        </form>

        <div class="text-center mt-4">
          <p class="text-sm text-secondary">
            Já tem cadastro? <a href="/index.html" style="color: var(--primary);">Fazer login</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import { supabase } from './js/supabase.js';

    const cadastroForm = document.getElementById('cadastroForm');
    const cadastroBtn = document.getElementById('cadastroBtn');
    const cadastroBtnText = document.getElementById('cadastroBtnText');
    const cadastroBtnLoading = document.getElementById('cadastroBtnLoading');
    const cadastroError = document.getElementById('cadastroError');

    cadastroForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validar senhas
      if (password !== confirmPassword) {
        cadastroError.textContent = 'As senhas não conferem. Tente novamente.';
        cadastroError.classList.add('show');
        return;
      }

      // Validar senha
      if (password.length < 6) {
        cadastroError.textContent = 'A senha deve ter no mínimo 6 caracteres.';
        cadastroError.classList.add('show');
        return;
      }

      cadastroBtn.disabled = true;
      cadastroBtnText.classList.add('hidden');
      cadastroBtnLoading.classList.remove('hidden');
      cadastroError.classList.remove('show');

      try {
        // Criar usuário no Supabase Auth
        const { data: authData, error: authError } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: {
              nome: nome,
            },
          },
        });

        if (authError) throw authError;

        // Criar perfil na tabela users
        const { error: profileError } = await supabase
          .from('users')
          .insert([
            {
              id: authData.user.id,
              email: email,
              nome: nome,
              role: 'normal',
              locais_autorizados: [],
            },
          ]);

        if (profileError) throw profileError;

        // Sucesso - redirecionar para login
        alert('Cadastro realizado com sucesso! Faça login para continuar.');
        window.location.href = '/index.html';
        
      } catch (error) {
        console.error('Erro no cadastro:', error);
        cadastroError.textContent = error.message || 'Erro ao cadastrar. Tente novamente.';
        cadastroError.classList.add('show');
        
        cadastroBtn.disabled = false;
        cadastroBtnText.classList.remove('hidden');
        cadastroBtnLoading.classList.add('hidden');
      }
    });

    // Service Worker para PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(registration => {
          console.log('SW registered:', registration);
        }).catch(error => {
          console.log('SW registration failed:', error);
        });
      });
    }
  </script>
</body>
</html>
