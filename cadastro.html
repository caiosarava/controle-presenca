<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cadastro - Controle de Presença">
  <meta name="theme-color" content="#6366f1">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/icon.svg">
  <title>Cadastro - Controle de Presença</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <img src="/assets/icon.svg" alt="Logo" style="width: 80px; height: 80px; margin-bottom: 1.5rem;">
          <h1>Criar Conta</h1>
          <p>Preencha os dados para se cadastrar</p>
        </div>

        <form id="cadastroForm" class="login-form">
          <div class="form-group">
            <label for="nome" class="label">Nome Completo</label>
            <input
              type="text"
              id="nome"
              name="nome"
              class="input"
              placeholder="Seu nome completo"
              required
              autocomplete="name"
            />
          </div>

          <div class="form-group">
            <label for="email" class="label">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              class="input"
              placeholder="seu@email.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="password" class="label">Senha</label>
            <div class="password-wrapper">
              <input type="password" id="password" name="password" class="input" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password" />
              <button type="button" class="password-toggle" id="togglePassword" aria-label="Mostrar senha" title="Mostrar senha">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword" class="label">Confirmar Senha</label>
            <div class="password-wrapper">
              <input type="password" id="confirmPassword" name="confirmPassword" class="input" placeholder="Confirme sua senha" required autocomplete="new-password" />
              <button type="button" class="password-toggle" id="toggleConfirmPassword" aria-label="Mostrar senha" title="Mostrar senha">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="locaisAutorizados" class="label">Onde você vai bater o ponto?</label>
            <select id="locaisAutorizados" class="input" multiple style="min-height: 100px;">
              <option value="">Carregando locais...</option>
            </select>
            <p class="text-sm text-secondary mt-2">Dica: clique segurando o dedo ou a tecla Ctrl para escolher mais de um.</p>
          </div>

          <div id="cadastroError" class="login-error"></div>

          <button type="submit" class="btn btn-primary btn-lg btn-block" id="cadastroBtn">
            <span id="cadastroBtnText">Cadastrar</span>
            <span id="cadastroBtnLoading" class="login-loading hidden">
              <span class="spinner"></span>
              Cadastrando...
            </span>
          </button>
        </form>

        <div class="text-center mt-4">
          <p class="text-sm text-secondary">
            Já tem cadastro? <a href="/index.html" style="color: var(--primary);">Fazer login</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import { supabase } from '/js/supabase.js';

    const cadastroForm = document.getElementById('cadastroForm');
    const togglePassword = document.getElementById('togglePassword');
    const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');

    const setupToggle = (btn, input) => {
      btn?.addEventListener('click', () => {
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
        btn.innerHTML = type === 'password'
          ? '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>'
          : '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" /></svg>';
        btn.setAttribute('aria-label', type === 'password' ? 'Mostrar senha' : 'Ocultar senha');
        btn.setAttribute('title', type === 'password' ? 'Mostrar senha' : 'Ocultar senha');
      });
    };

    setupToggle(togglePassword, passwordInput);
    setupToggle(toggleConfirmPassword, confirmPasswordInput);

    const selectLocais = document.getElementById('locaisAutorizados');
    const pracaXVId = '6bf258c8-66c5-42eb-949e-e32712740a91';

    async function carregarLocais() {
      try {
        const { data: locais, error } = await supabase
          .from('locais')
          .select('id, nome')
          .order('nome');

        if (error) throw error;

        if (locais) {
          selectLocais.innerHTML = locais.map(local =>
            `<option value="${local.id}" ${local.id === pracaXVId ? 'selected' : ''}>${local.nome}</option>`
          ).join('');
        }
      } catch (error) {
        console.error('Erro ao carregar locais:', error);
        selectLocais.innerHTML = '<option value="">Erro ao carregar locais</option>';
      }
    }

    carregarLocais();

    const cadastroBtn = document.getElementById('cadastroBtn');
    const cadastroBtnText = document.getElementById('cadastroBtnText');
    const cadastroBtnLoading = document.getElementById('cadastroBtnLoading');
    const cadastroError = document.getElementById('cadastroError');

    cadastroForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const locaisSelecionados = Array.from(selectLocais.selectedOptions, option => option.value).filter(v => v !== "");

      // Validar locais
      if (locaisSelecionados.length === 0) {
        cadastroError.textContent = 'Por favor, selecione pelo menos um local.';
        cadastroError.classList.add('show');
        return;
      }

      // Validar senhas
      if (password !== confirmPassword) {
        cadastroError.textContent = 'As senhas não conferem. Tente novamente.';
        cadastroError.classList.add('show');
        return;
      }

      // Validar senha
      if (password.length < 6) {
        cadastroError.textContent = 'A senha deve ter no mínimo 6 caracteres.';
        cadastroError.classList.add('show');
        return;
      }

      cadastroBtn.disabled = true;
      cadastroBtnText.classList.add('hidden');
      cadastroBtnLoading.classList.remove('hidden');
      cadastroError.classList.remove('show');

      try {
        // Criar usuário no Supabase Auth (o trigger cria o perfil automaticamente)
        const { data: authData, error: authError } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: {
              nome: nome,
              locais_autorizados: locaisSelecionados,
            },
          },
        });

        if (authError) throw authError;
        if (!authData.user) throw new Error('Erro ao criar usuário');

        // Sucesso - redirecionar para login
        alert('Cadastro realizado com sucesso! Faça login para continuar.');
        window.location.href = '/index.html';
        
      } catch (error) {
        console.error('Erro no cadastro:', error);
        let errorMsg = 'Erro ao cadastrar. ';
        
        if (error.message && error.message.includes('duplicate')) {
          errorMsg += 'Este e-mail já está cadastrado.';
        } else if (error.message && error.message.includes('password')) {
          errorMsg += 'Senha inválida.';
        } else if (error.message) {
          errorMsg += error.message;
        } else {
          errorMsg += 'Tente novamente.';
        }
        
        cadastroError.textContent = errorMsg;
        cadastroError.classList.add('show');
        
        cadastroBtn.disabled = false;
        cadastroBtnText.classList.remove('hidden');
        cadastroBtnLoading.classList.add('hidden');
      }
    });

    // Service Worker para PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(registration => {
          console.log('SW registered:', registration);
        }).catch(error => {
          console.log('SW registration failed:', error);
        });
      });
    }
  </script>
</body>
</html>
