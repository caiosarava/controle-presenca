<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sistema de Controle de Presença com Geolocalização">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Presença">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Presença">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/assets/icon.svg">
<link rel="apple-touch-icon" href="/assets/icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="/assets/icon-152.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="/assets/icon-192.png">
<title>Login - Controle de Presença</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/login.css">
<link rel="stylesheet" href="/css/pwa.css">
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <img src="/assets/icon.svg" alt="Logo" style="width: 80px; height: 80px; margin-bottom: 1.5rem;">
          <h1>Controle de Presença</h1>
          <p>Bem-vindo! Entre com seus dados para registrar sua presença.</p>
        </div>

        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="email" class="label">Seu e-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              class="input"
              placeholder="exemplo@email.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="password" class="label">Sua senha</label>
            <div class="password-wrapper">
              <input type="password" id="password" name="password" class="input" placeholder="••••••••" required autocomplete="current-password" />
              <button type="button" class="password-toggle" id="togglePassword" aria-label="Mostrar senha" title="Mostrar senha">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
              </button>
            </div>
          </div>


          <div id="loginError" class="login-error"></div>

          <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">
            <span id="loginBtnText">Entrar</span>
            <span id="loginBtnLoading" class="login-loading hidden">
              <span class="spinner"></span>
              Entrando...
            </span>
          </button>
        </form>

        <div class="text-center mt-4">
          <p class="text-sm text-secondary">
            Esqueceu sua senha? <a href="#" style="color: var(--primary);">Recuperar acesso</a>
          </p>
          <p class="text-sm text-secondary mt-2">
            Não tem conta? <a href="/cadastro.html" style="color: var(--primary);">Cadastrar-se</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import { signIn, setLocalStorageUser, getLocalStorageUser } from '/js/auth.js';

    const loginForm = document.getElementById('loginForm');
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const emailInput = document.getElementById('email');
    // Check if user is already logged in
    const urlParams = new URLSearchParams(window.location.search);
    const isLogout = urlParams.get('logout') === 'true';

    const currentUser = getLocalStorageUser();
    if (currentUser && !isLogout) {
      if (currentUser.profile?.role === 'admin') {
        window.location.href = '/admin/index.html';
      } else {
        window.location.href = '/dashboard.html';
      }
    }

    // Pre-fill email if saved
    const savedEmail = localStorage.getItem('rememberedEmail');
    if (savedEmail) {
      emailInput.value = savedEmail;
    }

    togglePassword?.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      togglePassword.innerHTML = type === 'password'
        ? '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>'
        : '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" /></svg>';
      togglePassword.setAttribute('aria-label', type === 'password' ? 'Mostrar senha' : 'Ocultar senha');
      togglePassword.setAttribute('title', type === 'password' ? 'Mostrar senha' : 'Ocultar senha');
    });

    const loginBtn = document.getElementById('loginBtn');
    const loginBtnText = document.getElementById('loginBtnText');
    const loginBtnLoading = document.getElementById('loginBtnLoading');
    const loginError = document.getElementById('loginError');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      loginBtn.disabled = true;
      loginBtnText.classList.add('hidden');
      loginBtnLoading.classList.remove('hidden');
      loginError.classList.remove('show');

      // Save email for next time
      localStorage.setItem('rememberedEmail', email);

  const result = await signIn(email, password);

  if (result.error) {
    let errorMessage = 'Erro ao fazer login. ';
    if (result.error.message && result.error.message.includes('perfil')) {
      errorMessage = result.error.message;
    } else if (result.error.message && result.error.message.includes('senha')) {
      errorMessage = 'E-mail ou senha inválidos.';
    } else if (result.error.message) {
      errorMessage = result.error.message;
    }
    loginError.textContent = errorMessage;
    loginError.classList.add('show');
    
    loginBtn.disabled = false;
    loginBtnText.classList.remove('hidden');
    loginBtnLoading.classList.add('hidden');
    return;
  }

setLocalStorageUser(result);

if (result.profile.role === 'admin') {
  window.location.href = '/admin/index.html';
} else {
  window.location.href = '/dashboard.html';
}
});
</script>

<!-- PWA Install Banner -->
<div id="install-pwa-banner" class="install-banner hidden">
  <div class="install-banner-content">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
    </svg>
    <span>Instale nosso app para uma experiência completa</span>
    <div class="install-banner-actions">
      <button id="btn-instalar-pwa" class="btn-install">Instalar</button>
      <button id="btn-fechar-pwa" class="btn-secondary">Depois</button>
    </div>
  </div>
</div>


<!-- Connection Status -->
<div id="connection-status" class="connection-status online">
  <span class="status-indicator"></span>
  <span class="status-text">Online</span>
</div>

<script type="module" src="/js/pwa.js"></script>
</body>
</html>
